<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Architect | Blueprint Edition</title>

    <link rel="stylesheet" href="simulator-style.css">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
</head>

<body class="blueprint-theme">

    <!-- TUTORIAL -->
    <div id="tutorial-overlay">
        <div class="modal-box">
            <div class="auth-tag">AUTHENTICATION REQUIRED</div>
            <h1 class="blueprint-title">COMMAND PROTOCOL</h1>

            <div class="protocol-list">
                <div class="step"><span>[01]</span> <b>DEPLOY:</b> Place routers</div>
                <div class="step"><span>[02]</span> <b>BRIDGE:</b> Connect routers</div>
                <div class="step"><span>[03]</span> <b>ASSIGN:</b> Set Start/End</div>
                <div class="step"><span>[04]</span> <b>EXECUTE:</b> Run A*</div>
            </div>

            <button id="close-tutorial" class="init-btn">
                INITIALIZE ARCHITECT
            </button>
        </div>
    </div>

    <!-- MAIN UI -->
    <div id="main-content-wrapper">

        <!-- LEFT PANEL -->
        <div id="dashboard-ui" class="blueprint-panel">

            <div class="label-ribbon">CONTROLS</div>

            <div class="tool-group">
                <button id="btn-node" class="tool-btn">ADD NODE</button>
                <button id="btn-link" class="tool-btn">ADD LINK</button>
                <select id="topologyType" class="tool-select">
                    <option value="mesh">MESH</option>
                    <option value="bus">BUS</option>
                    <option value="ring">RING</option>
                    <option value="star">STAR</option>
                </select>
                <button id="btn-mesh" class="tool-btn">GENERATE TOPOLOGY</button>
                <button id="btn-move" class="tool-btn active-tool">MOVE</button>
                <button id="btn-pan" class="tool-btn">PAN VIEW</button>
                <button id="btn-weight" class="tool-btn">SELECT EDGE</button>
                <button id="btn-congest" class="tool-btn danger-btn">CONGEST</button>
            </div>

            <div class="io-group">
                <button id="btn-start" class="io-btn">SET START</button>
                <button id="btn-end" class="io-btn">SET END</button>
            </div>

            <hr class="bp-divider">

            <div class="settings">
                <label>CONGESTION</label>
                <input type="range" id="noise-slider" min="0" max="100" value="20">
            </div>

            <div class="settings">
                <label>EDGE WEIGHT</label>
                <select id="weightLinkSelect" class="tool-select compact-select"></select>
                <div class="weight-controls">
                    <input type="number" id="edgeWeightInput" class="weight-input" min="0.1" step="0.1" value="1">
                    <button id="btn-apply-weight" class="tool-btn weight-btn">APPLY</button>
                </div>
            </div>

            <div class="settings">
                <label>GRAPH ZOOM</label>
                <div class="zoom-controls">
                    <button id="btn-zoom-out" class="tool-btn zoom-btn">-</button>
                    <button id="btn-reset-view" class="tool-btn zoom-btn">RESET VIEW</button>
                    <button id="btn-zoom-in" class="tool-btn zoom-btn">+</button>
                </div>
            </div>

            <div id="astar-info" class="settings">
                <label>A* LIVE</label>
                <div>Node <span id="nodeName">-</span></div>
                <div>g(n) <span id="gVal">-</span></div>
                <div>h(n) <span id="hVal">-</span></div>
                <div>f(n) <span id="fVal">-</span></div>
            </div>

            <button id="btn-calc-all" class="tool-btn">CALC ALL f(n)</button>
            <button id="btn-run" class="execute-btn">RUN</button>
            <button id="btn-reset" class="reset-btn">RESET GRAPH</button>
        </div>

        <!-- RIGHT PANEL -->
        <div id="traffic-monitor" class="blueprint-panel">
            <div class="label-ribbon">LIVE DATA</div>

            <div class="packet-stats">
                <div class="stat"><small>SENT</small> <span id="total-sent">0</span></div>
                <div class="stat"><small>ACTIVE</small> <span id="packet-count">0</span></div>

                <!-- 🔥 NEW: PATH COST -->
                <div class="stat">
                    <small>PATH COST</small>
                    <span id="path-cost">0</span>
                </div>
            </div>

            <div id="feed-container"></div>

            <div class="uptime-bar">
                UPTIME: <span id="uptime">00:00</span>
            </div>
        </div>

        <canvas id="networkCanvas"></canvas>

    </div>

    <script src="simulator.js"></script>

</body>
</html>
